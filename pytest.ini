# pytest.ini
# ─────────────────────────────────────────────────────────────────────────────
# Pytest configuration for Email Inbox Agent test suite.
# Place this file in the repo root so pytest finds it automatically.
# ─────────────────────────────────────────────────────────────────────────────

[pytest]

# Test discovery: only look in the tests/ directory
testpaths = tests

# Asyncio mode: auto means @pytest.mark.asyncio is applied to all async tests
# without needing to decorate each one individually
asyncio_mode = auto

# Output: short traceback format, verbose test names, no capture of stdout
# (so print() statements in code show up during CI runs for debugging)
addopts =
    -v
    --tb=short
    -p no:cacheprovider

# Warnings: turn common async deprecation warnings into errors so we catch them early
filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:motor.*
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:httpx.*
    ignore::UserWarning:torch.*
    ignore::UserWarning:transformers.*
